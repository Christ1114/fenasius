<svg width="100%" viewBox="0 0 680 700" role="img" fill="none" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:none;stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Fenasius style xAI sans fond</title>
<desc style="fill:none;stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Fenasius en traits fins monochrome transparent</desc>

<!-- Cercle principal -->
<circle cx="340" cy="300" r="180" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none" style="fill:none;stroke:rgba(255, 255, 255, 0.15);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Orbite elliptique inclinée -->
<ellipse cx="340" cy="300" rx="180" ry="60" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none" transform="rotate(-30 340 300)" style="fill:none;stroke:rgba(255, 255, 255, 0.08);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Points orbitaux -->
<circle cx="340" cy="120" r="6" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" style="fill:none;stroke:rgba(255, 255, 255, 0.25);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="520" cy="300" r="6" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" style="fill:none;stroke:rgba(255, 255, 255, 0.25);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="160" cy="300" r="6" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" style="fill:none;stroke:rgba(255, 255, 255, 0.25);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<circle cx="340" cy="120" r="2" fill="rgba(255,255,255,0.3)" style="fill:rgba(255, 255, 255, 0.3);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="520" cy="300" r="2" fill="rgba(255,255,255,0.3)" style="fill:rgba(255, 255, 255, 0.3);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="160" cy="300" r="2" fill="rgba(255,255,255,0.3)" style="fill:rgba(255, 255, 255, 0.3);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Étoile 4 branches -->
<path d="M340 220 C340 220 330 280 280 300 C330 320 340 380 340 380 C340 380 350 320 400 300 C350 280 340 220 340 220 Z" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="rgba(255,255,255,0.04)" style="fill:rgba(255, 255, 255, 0.04);stroke:rgba(255, 255, 255, 0.2);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<line x1="340" y1="235" x2="340" y2="365" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" style="fill:none;stroke:rgba(255, 255, 255, 0.06);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="290" y1="300" x2="390" y2="300" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" style="fill:none;stroke:rgba(255, 255, 255, 0.06);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Tige symbole féminin -->
<line x1="340" y1="480" x2="340" y2="560" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" style="fill:none;stroke:rgba(255, 255, 255, 0.2);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="300" y1="525" x2="380" y2="525" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" style="fill:none;stroke:rgba(255, 255, 255, 0.2);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Cercle intérieur décoratif -->
<circle cx="340" cy="300" r="90" stroke="rgba(255,255,255,0.05)" stroke-width="1" fill="none" stroke-dasharray="4 8" style="fill:none;stroke:rgba(255, 255, 255, 0.05);color:rgb(255, 255, 255);stroke-width:1px;stroke-dasharray:4px, 8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Arc décoratif externe -->
<path d="M 200 180 A 200 200 0 0 1 480 180" stroke="rgba(255,255,255,0.05)" stroke-width="0.8" fill="none" style="fill:none;stroke:rgba(255, 255, 255, 0.05);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>